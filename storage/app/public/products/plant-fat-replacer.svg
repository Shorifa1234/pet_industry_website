<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d3b1e"/><stop offset="100%" style="stop-color:#155724"/>
    </linearGradient>
    <linearGradient id="jar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.35)"/><stop offset="100%" style="stop-color:rgba(255,255,255,0.15)"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Leaves background -->
  <g opacity="0.15">
    <path d="M50,200 Q20,100 80,40 Q80,40 80,120 Z" fill="#2ecc71"/><path d="M50,200 Q80,100 80,40 Q80,40 80,120 Z" fill="#27ae60"/>
    <path d="M520,220 Q490,100 560,50 Q560,50 550,130 Z" fill="#2ecc71"/><path d="M520,220 Q560,100 560,50 Q560,50 550,130 Z" fill="#27ae60"/>
  </g>
  <!-- Wide jar -->
  <g transform="translate(155, 40)">
    <!-- Lid -->
    <rect x="30" y="0" width="230" height="30" rx="8" fill="rgba(39,174,96,0.8)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <rect x="40" y="6" width="210" height="18" rx="5" fill="rgba(255,255,255,0.1)"/>
    <text x="145" y="20" font-family="Arial" font-size="10" fill="white" text-anchor="middle" font-weight="bold">PLANT-BASED</text>
    <!-- Jar body -->
    <path d="M10,30 Q0,40 0,60 L0,270 Q0,300 145,300 Q290,300 290,270 L290,60 Q290,40 280,30 Z" fill="url(#jar)" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
    <!-- Label -->
    <rect x="20" y="70" width="250" height="180" rx="8" fill="rgba(255,255,255,0.12)"/>
    <rect x="20" y="70" width="250" height="55" rx="8" fill="rgba(39,174,96,0.5)"/>
    <text x="145" y="90"  font-family="Arial" font-size="13" fill="white" text-anchor="middle" font-weight="900">PLANT-BASED</text>
    <text x="145" y="106" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-weight="bold">FAT REPLACER</text>
    <text x="145" y="120" font-family="Arial" font-size="8"  fill="rgba(255,255,255,0.7)" text-anchor="middle">Clean Label Formula</text>
    <!-- Leaf icon -->
    <g transform="translate(110, 135)" opacity="0.8">
      <path d="M35,60 Q10,30 25,5 Q25,5 25,30 Z" fill="#2ecc71"/>
      <path d="M35,60 Q60,30 25,5 Q25,5 25,30 Z" fill="#27ae60" opacity="0.8"/>
      <line x1="25" y1="5" x2="35" y2="60" stroke="#2ecc71" stroke-width="1.5"/>
    </g>
    <!-- Features list -->
    <g font-family="Arial" font-size="8" fill="rgba(255,255,255,0.75)">
      <text x="35" y="220">✓ Vegan Certified</text>
      <text x="35" y="232">✓ 0% Trans Fat</text>
      <text x="35" y="244">✓ Non-GMO Verified</text>
      <text x="155" y="220">✓ Halal</text>
      <text x="155" y="232">✓ Kosher</text>
      <text x="155" y="244">✓ Gluten Free</text>
    </g>
    <!-- Shine -->
    <path d="M15,50 Q12,100 12,160" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="6" stroke-linecap="round"/>
  </g>
  <rect x="0" y="360" width="600" height="40" fill="rgba(0,0,0,0.4)"/>
  <text x="300" y="376" font-family="'Inter',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle">INGREDIENTS CATEGORY</text>
  <text x="300" y="392" font-family="'Inter',Arial,sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="700">Plant-Based Fat Replacer</text>
</svg>
