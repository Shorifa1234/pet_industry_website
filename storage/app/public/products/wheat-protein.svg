<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c1e0f"/><stop offset="100%" style="stop-color:#3d2b0e"/>
    </linearGradient>
    <linearGradient id="bag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.25)"/><stop offset="100%" style="stop-color:rgba(255,255,255,0.1)"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Wheat stalks background -->
  <g opacity="0.3">
    <line x1="80"  y1="380" x2="90"  y2="80"  stroke="#e67e22" stroke-width="2"/>
    <line x1="120" y1="380" x2="130" y2="60"  stroke="#e67e22" stroke-width="2"/>
    <line x1="460" y1="380" x2="470" y2="80"  stroke="#e67e22" stroke-width="2"/>
    <line x1="500" y1="380" x2="510" y2="60"  stroke="#e67e22" stroke-width="2"/>
    <g fill="#e67e22">
      <ellipse cx="85"  cy="70"  rx="7" ry="14" /><ellipse cx="79"  cy="58"  rx="6" ry="12" transform="rotate(-20 79 58)"/><ellipse cx="91"  cy="56"  rx="6" ry="12" transform="rotate(20 91 56)"/>
      <ellipse cx="125" cy="50"  rx="7" ry="14" /><ellipse cx="119" cy="38"  rx="6" ry="12" transform="rotate(-20 119 38)"/><ellipse cx="131" cy="36"  rx="6" ry="12" transform="rotate(20 131 36)"/>
      <ellipse cx="465" cy="70"  rx="7" ry="14" /><ellipse cx="459" cy="58"  rx="6" ry="12" transform="rotate(-20 459 58)"/><ellipse cx="471" cy="56"  rx="6" ry="12" transform="rotate(20 471 56)"/>
      <ellipse cx="505" cy="50"  rx="7" ry="14" /><ellipse cx="499" cy="38"  rx="6" ry="12" transform="rotate(-20 499 38)"/><ellipse cx="511" cy="36"  rx="6" ry="12" transform="rotate(20 511 36)"/>
    </g>
  </g>
  <!-- Powder bag/pouch -->
  <g transform="translate(175, 50)">
    <!-- Bag shape -->
    <path d="M30,0 L220,0 L240,30 L240,300 Q240,320 120,320 Q0,320 0,300 L0,30 Z" fill="url(#bag)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <!-- Top seal -->
    <rect x="0" y="0" width="240" height="28" rx="4" fill="rgba(255,255,255,0.15)"/>
    <rect x="10" y="8" width="220" height="12" rx="2" fill="rgba(255,255,255,0.1)"/>
    <!-- Label area -->
    <rect x="15" y="45" width="210" height="220" rx="8" fill="rgba(255,255,255,0.12)"/>
    <!-- Top label stripe -->
    <rect x="15" y="45" width="210" height="50" rx="8" fill="#e67e22" opacity="0.75"/>
    <text x="120" y="62" font-family="Arial" font-size="10" fill="white" text-anchor="middle" font-weight="bold" letter-spacing="2">ORGANIC</text>
    <text x="120" y="78" font-family="Arial" font-size="9"  fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="1">WHEAT PROTEIN</text>
    <text x="120" y="90" font-family="Arial" font-size="8"  fill="rgba(255,255,255,0.7)" text-anchor="middle">I S O L A T E</text>
    <!-- Wheat icon center -->
    <g transform="translate(95, 108)" opacity="0.7">
      <line x1="25" y1="80" x2="25" y2="10" stroke="rgba(230,126,34,0.8)" stroke-width="2"/>
      <ellipse cx="19" cy="8"  rx="7" ry="13" fill="#e67e22" opacity="0.8" transform="rotate(-15 19 8)"/>
      <ellipse cx="31" cy="5"  rx="7" ry="13" fill="#e67e22" opacity="0.7" transform="rotate(15 31 5)"/>
      <ellipse cx="25" cy="0"  rx="7" ry="14" fill="#e67e22"/>
      <line x1="25" y1="35" x2="10" y2="22" stroke="rgba(230,126,34,0.5)" stroke-width="1.5"/>
      <line x1="25" y1="45" x2="40" y2="32" stroke="rgba(230,126,34,0.5)" stroke-width="1.5"/>
    </g>
    <!-- Nutrition facts -->
    <rect x="25" y="200" width="190" height="55" rx="4" fill="rgba(255,255,255,0.1)"/>
    <text x="120" y="214" font-family="Arial" font-size="8"  fill="rgba(255,255,255,0.6)" text-anchor="middle">Per 30g serving</text>
    <text x="50"  y="228" font-family="Arial" font-size="8"  fill="rgba(255,255,255,0.8)">Protein</text>
    <text x="200" y="228" font-family="Arial" font-size="8"  fill="#e67e22" text-anchor="end" font-weight="bold">25g</text>
    <text x="50"  y="240" font-family="Arial" font-size="8"  fill="rgba(255,255,255,0.8)">Calories</text>
    <text x="200" y="240" font-family="Arial" font-size="8"  fill="rgba(255,255,255,0.7)" text-anchor="end">110 kcal</text>
    <text x="50"  y="252" font-family="Arial" font-size="8"  fill="rgba(255,255,255,0.8)">Non-GMO</text>
    <text x="200" y="252" font-family="Arial" font-size="8"  fill="#2ecc71" text-anchor="end">✓ Certified</text>
    <!-- Bottom weight -->
    <text x="120" y="298" font-family="Arial" font-size="18" fill="rgba(255,255,255,0.5)" text-anchor="middle" font-weight="900">25 KG</text>
  </g>
  <rect x="0" y="360" width="600" height="40" fill="rgba(0,0,0,0.4)"/>
  <text x="300" y="376" font-family="'Inter',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle">INGREDIENTS CATEGORY</text>
  <text x="300" y="392" font-family="'Inter',Arial,sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="700">Organic Wheat Protein Isolate</text>
</svg>
