<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c"/><stop offset="100%" style="stop-color:#0e2240"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(230,126,34,0.7)"/><stop offset="100%" style="stop-color:rgba(230,126,34,0.4)"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Aroma swirls -->
  <g fill="none" stroke="rgba(230,126,34,0.25)" stroke-width="2">
    <path d="M200,80 Q230,50 260,80 Q290,110 260,140"/><path d="M220,70 Q255,35 290,70 Q325,105 290,145"/>
    <path d="M240,60 Q280,20 320,60 Q360,100 320,150"/>
  </g>
  <!-- Dropper bottle -->
  <g transform="translate(220, 60)">
    <rect x="55" y="0" width="30" height="18" rx="5" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <rect x="60" y="18" width="20" height="40" rx="3" fill="rgba(255,255,255,0.25)"/>
    <path d="M45,58 Q30,65 28,80 L28,230 Q28,245 70,245 Q112,245 112,230 L112,80 Q110,65 95,58 Z" fill="url(#bottle)"/>
    <path d="M45,58 Q30,65 28,80 L28,230 Q28,245 70,245 Q112,245 112,230 L112,80 Q110,65 95,58 Z" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <!-- Label -->
    <rect x="35" y="100" width="70" height="90" rx="4" fill="rgba(255,255,255,0.15)"/>
    <rect x="38" y="106" width="64" height="16" rx="2" fill="#e67e22" opacity="0.8"/>
    <text x="70" y="118" font-family="Arial" font-size="8" fill="white" text-anchor="middle" font-weight="bold">NATURAL</text>
    <text x="70" y="132" font-family="Arial" font-size="7" fill="rgba(255,255,255,0.8)" text-anchor="middle">FLAVOR</text>
    <text x="70" y="143" font-family="Arial" font-size="7" fill="rgba(255,255,255,0.8)" text-anchor="middle">ENHANCER</text>
    <rect x="38" y="148" width="64" height="3" rx="1" fill="rgba(255,255,255,0.2)"/>
    <rect x="38" y="155" width="50" height="3" rx="1" fill="rgba(255,255,255,0.15)"/>
    <rect x="38" y="162" width="55" height="3" rx="1" fill="rgba(255,255,255,0.15)"/>
    <text x="70" y="182" font-family="Arial" font-size="8" fill="#e67e22" text-anchor="middle">PRO GRADE</text>
    <!-- Shine -->
    <path d="M36,70 Q34,90 34,130" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="4" stroke-linecap="round"/>
    <!-- Drop -->
    <ellipse cx="70" cy="255" rx="6" ry="10" fill="rgba(230,126,34,0.8)"/>
    <ellipse cx="70" cy="270" rx="3" ry="5"  fill="rgba(230,126,34,0.5)"/>
  </g>
  <!-- Herb/leaf accents -->
  <g transform="translate(80, 180)" opacity="0.6">
    <path d="M20,80 Q0,40 30,10 Q30,10 30,50 Z" fill="#27ae60"/>
    <path d="M20,80 Q40,40 30,10 Q30,10 30,50 Z" fill="#2ecc71" opacity="0.7"/>
    <line x1="30" y1="10" x2="20" y2="80" stroke="#27ae60" stroke-width="1.5"/>
  </g>
  <g transform="translate(430, 160)" opacity="0.5">
    <path d="M20,80 Q0,40 30,10 Q30,10 30,50 Z" fill="#27ae60"/>
    <path d="M20,80 Q40,40 30,10 Q30,10 30,50 Z" fill="#2ecc71" opacity="0.7"/>
    <line x1="30" y1="10" x2="20" y2="80" stroke="#27ae60" stroke-width="1.5"/>
  </g>
  <!-- Stars/sparkles -->
  <g fill="#e67e22" opacity="0.6">
    <circle cx="120" cy="120" r="3"/><circle cx="460" cy="100" r="2"/><circle cx="480" cy="250" r="3"/><circle cx="100" cy="300" r="2"/>
    <text x="115" y="108" font-size="12" text-anchor="middle">✦</text><text x="468" y="93" font-size="10" text-anchor="middle">✦</text>
  </g>
  <!-- Bottom bar -->
  <rect x="0" y="360" width="600" height="40" fill="rgba(0,0,0,0.35)"/>
  <text x="300" y="376" font-family="'Inter',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle">INGREDIENTS CATEGORY</text>
  <text x="300" y="392" font-family="'Inter',Arial,sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="700">Natural Flavor Enhancer Pro</text>
</svg>
