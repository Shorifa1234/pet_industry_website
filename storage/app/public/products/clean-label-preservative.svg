<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2e1a"/><stop offset="100%" style="stop-color:#0d1f2d"/>
    </linearGradient>
    <linearGradient id="tin" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/><stop offset="100%" style="stop-color:rgba(255,255,255,0.1)"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Leaf pattern -->
  <g opacity="0.08" fill="#27ae60">
    <path d="M0,200 Q50,100 100,50 Q100,50 100,150 Z"/><path d="M600,200 Q550,100 500,50 Q500,50 500,150 Z"/>
    <path d="M0,380 Q60,280 120,240 Q120,240 110,320 Z"/><path d="M600,380 Q540,280 480,240 Q480,240 490,320 Z"/>
  </g>
  <!-- Main tin/can -->
  <g transform="translate(170, 30)">
    <!-- Lid -->
    <ellipse cx="130" cy="30" rx="130" ry="30" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <ellipse cx="130" cy="30" rx="110" ry="22" fill="rgba(255,255,255,0.1)"/>
    <!-- Pull tab -->
    <rect x="110" y="10" width="40" height="12" rx="6" fill="rgba(255,255,255,0.3)"/>
    <circle cx="155" cy="6" r="5" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <!-- Body -->
    <rect x="0" y="30" width="260" height="270" rx="8" fill="url(#tin)"/>
    <!-- Bottom -->
    <ellipse cx="130" cy="300" rx="130" ry="22" fill="rgba(255,255,255,0.15)"/>
    <!-- Label wrap -->
    <rect x="5" y="55" width="250" height="210" rx="5" fill="rgba(255,255,255,0.08)"/>
    <!-- Top label stripe -->
    <rect x="5" y="55" width="250" height="60" rx="5" fill="rgba(39,174,96,0.5)"/>
    <text x="130" y="76"  font-family="'Inter',Arial,sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="900" letter-spacing="2">CLEAN LABEL</text>
    <text x="130" y="92"  font-family="'Inter',Arial,sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="900">PRESERVATIVE</text>
    <text x="130" y="107" font-family="Arial" font-size="8"  fill="rgba(255,255,255,0.7)" text-anchor="middle">Natural • Effective • Safe</text>
    <!-- Center clean badge -->
    <circle cx="130" cy="160" r="45" fill="rgba(39,174,96,0.15)" stroke="#27ae60" stroke-width="2"/>
    <text x="130" y="148" font-family="Arial" font-size="9"  fill="rgba(255,255,255,0.7)" text-anchor="middle">NO</text>
    <text x="130" y="162" font-family="Arial" font-size="14" fill="#2ecc71" text-anchor="middle" font-weight="900">ARTIFICIAL</text>
    <text x="130" y="176" font-family="Arial" font-size="9"  fill="rgba(255,255,255,0.7)" text-anchor="middle">additives</text>
    <!-- Feature icons row -->
    <g font-family="Arial" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.65)">
      <text x="42"  y="228">🌿</text><text x="42"  y="240">Natural</text>
      <text x="90"  y="228">🛡️</text><text x="90"  y="240">Safe</text>
      <text x="138" y="228">✅</text><text x="138" y="240">Certified</text>
      <text x="186" y="228">♻</text><text x="186" y="240">Eco</text>
      <text x="228" y="228">🔬</text><text x="228" y="240">Tested</text>
    </g>
    <!-- Weight -->
    <text x="130" y="285" font-family="Arial" font-size="16" fill="rgba(255,255,255,0.3)" text-anchor="middle" font-weight="900">NET 5 KG</text>
    <!-- Shine -->
    <path d="M8,40 Q6,80 6,150" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="7" stroke-linecap="round"/>
  </g>
  <!-- Certified badges (corners) -->
  <g transform="translate(40, 60)">
    <circle cx="30" cy="30" r="28" fill="rgba(39,174,96,0.2)" stroke="#27ae60" stroke-width="1.5"/>
    <text x="30" y="25" font-family="Arial" font-size="8"  fill="#2ecc71" text-anchor="middle" font-weight="bold">NON</text>
    <text x="30" y="35" font-family="Arial" font-size="8"  fill="#2ecc71" text-anchor="middle" font-weight="bold">GMO</text>
    <text x="30" y="45" font-family="Arial" font-size="7"  fill="rgba(255,255,255,0.5)" text-anchor="middle">verified</text>
  </g>
  <g transform="translate(492, 60)">
    <circle cx="30" cy="30" r="28" fill="rgba(39,174,96,0.2)" stroke="#27ae60" stroke-width="1.5"/>
    <text x="30" y="25" font-family="Arial" font-size="7"  fill="#2ecc71" text-anchor="middle">ORGANIC</text>
    <text x="30" y="35" font-family="Arial" font-size="8"  fill="white"   text-anchor="middle" font-weight="bold">✓</text>
    <text x="30" y="46" font-family="Arial" font-size="7"  fill="rgba(255,255,255,0.5)" text-anchor="middle">certified</text>
  </g>
  <rect x="0" y="360" width="600" height="40" fill="rgba(0,0,0,0.4)"/>
  <text x="300" y="376" font-family="'Inter',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle">INGREDIENTS CATEGORY</text>
  <text x="300" y="392" font-family="'Inter',Arial,sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="700">Clean Label Preservative</text>
</svg>
