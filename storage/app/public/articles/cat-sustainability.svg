<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d3b1e"/>
      <stop offset="100%" style="stop-color:#1a5c2a"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60"/>
      <stop offset="100%" style="stop-color:#2ecc71"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Background circles -->
  <circle cx="400" cy="210" r="200" fill="rgba(39,174,96,0.06)"/>
  <circle cx="400" cy="210" r="140" fill="rgba(39,174,96,0.05)"/>
  <circle cx="400" cy="210" r="80"  fill="rgba(39,174,96,0.04)"/>

  <!-- Recycle arrows (center) -->
  <g transform="translate(290, 70)" opacity="0.9">
    <!-- Arrow 1 (top) -->
    <path d="M110,0 L160,60 L130,60 Q140,130 80,160 L60,120 Q100,105 100,60 L70,60 Z"
          fill="url(#leaf)" opacity="0.85"/>
    <!-- Arrow 2 (bottom-right) -->
    <path d="M220,130 L160,200 L140,170 Q80,195 50,150 L90,130 Q110,165 150,145 L130,115 Z"
          fill="url(#leaf)" opacity="0.75"/>
    <!-- Arrow 3 (bottom-left) -->
    <path d="M0,130 L30,60 L50,90 Q90,60 130,80 L110,120 Q80,100 55,120 L80,155 Z"
          fill="url(#leaf)" opacity="0.8"/>
    <!-- Center circle -->
    <circle cx="110" cy="130" r="30" fill="rgba(39,174,96,0.3)" stroke="#27ae60" stroke-width="3"/>
    <text x="110" y="136" font-family="Arial" font-size="22" fill="#2ecc71" text-anchor="middle">♻</text>
  </g>

  <!-- Big leaf (left) -->
  <g transform="translate(55, 60)" opacity="0.8">
    <path d="M20,220 Q-20,120 40,60 Q100,0 160,20 Q120,80 100,140 Q160,80 200,30 Q220,100 180,160 Q140,210 20,220 Z"
          fill="url(#leaf)" opacity="0.6"/>
    <path d="M20,220 Q80,160 120,100" stroke="#27ae60" stroke-width="2.5" fill="none" stroke-dasharray="6,4"/>
    <path d="M120,100 Q100,60 160,20" stroke="#27ae60" stroke-width="2" fill="none" stroke-dasharray="4,4"/>
  </g>

  <!-- Small leaf (right) -->
  <g transform="translate(590, 80)" opacity="0.75">
    <path d="M15,160 Q-10,90 25,40 Q70,0 120,15 Q90,55 75,100 Q120,55 150,20 Q170,75 140,120 Q105,155 15,160 Z"
          fill="url(#leaf)" opacity="0.5"/>
  </g>

  <!-- CO2 down arrow + leaf icon (top right) -->
  <g transform="translate(660, 50)">
    <circle cx="45" cy="45" r="42" fill="rgba(39,174,96,0.2)" stroke="#27ae60" stroke-width="2"/>
    <text x="45" y="35" font-family="Arial" font-size="13" fill="#2ecc71" text-anchor="middle" font-weight="bold">CO₂</text>
    <polygon points="45,42 35,58 55,58" fill="#2ecc71"/>
    <line x1="45" y1="58" x2="45" y2="72" stroke="#2ecc71" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Category badge -->
  <rect x="50" y="340" width="160" height="32" rx="16" fill="#27ae60"/>
  <text x="130" y="361" font-family="'Inter',Arial,sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1">SUSTAINABILITY</text>

  <!-- Earth/globe simple -->
  <g transform="translate(660, 280)">
    <circle cx="50" cy="50" r="45" fill="rgba(39,174,96,0.2)" stroke="#27ae60" stroke-width="2"/>
    <ellipse cx="50" cy="50" rx="20" ry="45" fill="none" stroke="rgba(39,174,96,0.4)" stroke-width="1.5"/>
    <line x1="5" y1="50" x2="95" y2="50" stroke="rgba(39,174,96,0.3)" stroke-width="1.5"/>
    <line x1="14" y1="22" x2="86" y2="22" stroke="rgba(39,174,96,0.25)" stroke-width="1"/>
    <line x1="14" y1="78" x2="86" y2="78" stroke="rgba(39,174,96,0.25)" stroke-width="1"/>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="390" width="800" height="30" fill="rgba(0,0,0,0.3)"/>
  <text x="400" y="408" font-family="'Inter',Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="600">
    Sustainable Practices &amp; Green Innovation in Food Industry
  </text>
</svg>
