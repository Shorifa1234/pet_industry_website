<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0d2137"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Circuit board lines -->
  <g stroke="rgba(52,152,219,0.2)" stroke-width="1" fill="none">
    <polyline points="0,100 100,100 100,50 200,50 200,100 350,100"/>
    <polyline points="350,100 350,200 500,200 500,100 650,100 650,180 800,180"/>
    <polyline points="0,250 150,250 150,320 300,320 300,250 500,250"/>
    <polyline points="500,250 500,180 650,180"/>
    <polyline points="0,350 200,350 200,320"/>
    <polyline points="650,100 650,50 800,50"/>
  </g>
  <!-- Circuit dots -->
  <g fill="rgba(52,152,219,0.4)">
    <circle cx="100" cy="100" r="4"/><circle cx="200" cy="50"  r="4"/>
    <circle cx="200" cy="100" r="4"/><circle cx="350" cy="100" r="4"/>
    <circle cx="350" cy="200" r="4"/><circle cx="500" cy="200" r="4"/>
    <circle cx="500" cy="100" r="4"/><circle cx="650" cy="100" r="4"/>
    <circle cx="650" cy="180" r="4"/><circle cx="150" cy="250" r="4"/>
    <circle cx="150" cy="320" r="4"/><circle cx="300" cy="320" r="4"/>
    <circle cx="300" cy="250" r="4"/><circle cx="500" cy="250" r="4"/>
  </g>

  <!-- Main gear (center-left) -->
  <g transform="translate(200, 110)">
    <circle cx="80" cy="80" r="70" fill="none" stroke="rgba(230,126,34,0.3)" stroke-width="2"/>
    <!-- Gear teeth -->
    <g fill="rgba(230,126,34,0.5)" stroke="rgba(230,126,34,0.4)" stroke-width="1">
      <rect x="72"  y="0"   width="16" height="22" rx="3" transform="rotate(0   80 80)"/>
      <rect x="72"  y="0"   width="16" height="22" rx="3" transform="rotate(45  80 80)"/>
      <rect x="72"  y="0"   width="16" height="22" rx="3" transform="rotate(90  80 80)"/>
      <rect x="72"  y="0"   width="16" height="22" rx="3" transform="rotate(135 80 80)"/>
      <rect x="72"  y="0"   width="16" height="22" rx="3" transform="rotate(180 80 80)"/>
      <rect x="72"  y="0"   width="16" height="22" rx="3" transform="rotate(225 80 80)"/>
      <rect x="72"  y="0"   width="16" height="22" rx="3" transform="rotate(270 80 80)"/>
      <rect x="72"  y="0"   width="16" height="22" rx="3" transform="rotate(315 80 80)"/>
    </g>
    <circle cx="80" cy="80" r="50" fill="rgba(230,126,34,0.15)" stroke="#e67e22" stroke-width="2"/>
    <circle cx="80" cy="80" r="22" fill="rgba(230,126,34,0.2)" stroke="#e67e22" stroke-width="1.5"/>
    <!-- Bolt -->
    <circle cx="80" cy="80" r="10" fill="#e67e22" opacity="0.8"/>
  </g>

  <!-- Small gear (right of main) -->
  <g transform="translate(380, 145)">
    <g fill="rgba(52,152,219,0.4)" stroke="rgba(52,152,219,0.3)" stroke-width="1">
      <rect x="38" y="0"  width="10" height="14" rx="2" transform="rotate(0   43 43)"/>
      <rect x="38" y="0"  width="10" height="14" rx="2" transform="rotate(60  43 43)"/>
      <rect x="38" y="0"  width="10" height="14" rx="2" transform="rotate(120 43 43)"/>
      <rect x="38" y="0"  width="10" height="14" rx="2" transform="rotate(180 43 43)"/>
      <rect x="38" y="0"  width="10" height="14" rx="2" transform="rotate(240 43 43)"/>
      <rect x="38" y="0"  width="10" height="14" rx="2" transform="rotate(300 43 43)"/>
    </g>
    <circle cx="43" cy="43" r="28" fill="rgba(52,152,219,0.1)" stroke="#3498db" stroke-width="1.5"/>
    <circle cx="43" cy="43" r="12" fill="rgba(52,152,219,0.2)"/>
    <circle cx="43" cy="43" r="6"  fill="#3498db" opacity="0.7"/>
  </g>

  <!-- Factory conveyor belt (bottom center) -->
  <g transform="translate(100, 290)" opacity="0.8">
    <!-- Belt -->
    <rect x="0" y="20" width="580" height="30" rx="15" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <!-- Belt lines -->
    <g stroke="rgba(255,255,255,0.15)" stroke-width="1">
      <line x1="60"  y1="20" x2="60"  y2="50"/>
      <line x1="120" y1="20" x2="120" y2="50"/>
      <line x1="180" y1="20" x2="180" y2="50"/>
      <line x1="240" y1="20" x2="240" y2="50"/>
      <line x1="300" y1="20" x2="300" y2="50"/>
      <line x1="360" y1="20" x2="360" y2="50"/>
      <line x1="420" y1="20" x2="420" y2="50"/>
      <line x1="480" y1="20" x2="480" y2="50"/>
    </g>
    <!-- Rollers -->
    <circle cx="15"  cy="35" r="14" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <circle cx="565" cy="35" r="14" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <!-- Products on belt -->
    <rect x="70"  y="5"  width="40" height="18" rx="4" fill="rgba(230,126,34,0.5)"/>
    <rect x="190" y="5"  width="40" height="18" rx="4" fill="rgba(230,126,34,0.4)"/>
    <rect x="310" y="5"  width="40" height="18" rx="4" fill="rgba(230,126,34,0.45)"/>
    <rect x="430" y="5"  width="40" height="18" rx="4" fill="rgba(230,126,34,0.35)"/>
  </g>

  <!-- Tech label top right -->
  <g transform="translate(600, 50)">
    <rect x="0" y="0" width="160" height="70" rx="8" fill="rgba(52,152,219,0.15)" stroke="rgba(52,152,219,0.3)" stroke-width="1"/>
    <text x="80" y="24" font-family="'Inter',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle">EFFICIENCY GAIN</text>
    <text x="80" y="52" font-family="'Inter',Arial,sans-serif" font-size="30" fill="#3498db" text-anchor="middle" font-weight="900">-30%</text>
    <text x="80" y="66" font-family="'Inter',Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" text-anchor="middle">production costs</text>
  </g>

  <!-- Category badge -->
  <rect x="50" y="340" width="220" height="32" rx="16" fill="#3498db"/>
  <text x="160" y="361" font-family="'Inter',Arial,sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1">PROCESSING &amp; TECHNOLOGY</text>

  <!-- Bottom bar -->
  <rect x="0" y="390" width="800" height="30" fill="rgba(0,0,0,0.4)"/>
  <text x="400" y="408" font-family="'Inter',Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="600">
    Smart Technology &amp; Automation in Food Processing
  </text>
</svg>
