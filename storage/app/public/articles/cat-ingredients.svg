<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c1654"/>
      <stop offset="100%" style="stop-color:#1a3a5c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Background glow -->
  <circle cx="400" cy="210" r="180" fill="rgba(230,126,34,0.05)"/>
  <circle cx="200" cy="150" r="100" fill="rgba(155,89,182,0.08)"/>
  <circle cx="620" cy="270" r="120" fill="rgba(52,152,219,0.06)"/>

  <!-- Molecule / protein structure (center) -->
  <!-- Atoms -->
  <g>
    <!-- Central atom -->
    <circle cx="400" cy="210" r="28" fill="rgba(230,126,34,0.3)" stroke="#e67e22" stroke-width="3"/>
    <text x="400" y="216" font-family="Arial" font-size="14" fill="#e67e22" text-anchor="middle" font-weight="bold">C</text>

    <!-- Surrounding atoms with bonds -->
    <line x1="400" y1="182" x2="400" y2="135" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <circle cx="400" cy="120" r="20" fill="rgba(52,152,219,0.4)" stroke="#3498db" stroke-width="2"/>
    <text x="400" y="126" font-family="Arial" font-size="12" fill="#3498db" text-anchor="middle" font-weight="bold">N</text>

    <line x1="428" y1="198" x2="472" y2="175" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <circle cx="488" cy="167" r="20" fill="rgba(46,204,113,0.4)" stroke="#2ecc71" stroke-width="2"/>
    <text x="488" y="173" font-family="Arial" font-size="12" fill="#2ecc71" text-anchor="middle" font-weight="bold">O</text>

    <line x1="428" y1="222" x2="472" y2="245" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <circle cx="488" cy="253" r="20" fill="rgba(231,76,60,0.4)" stroke="#e74c3c" stroke-width="2"/>
    <text x="488" y="259" font-family="Arial" font-size="12" fill="#e74c3c" text-anchor="middle" font-weight="bold">H</text>

    <line x1="400" y1="238" x2="400" y2="285" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <circle cx="400" cy="300" r="20" fill="rgba(155,89,182,0.4)" stroke="#9b59b6" stroke-width="2"/>
    <text x="400" y="306" font-family="Arial" font-size="12" fill="#9b59b6" text-anchor="middle" font-weight="bold">P</text>

    <line x1="372" y1="222" x2="328" y2="245" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <circle cx="312" cy="253" r="20" fill="rgba(52,152,219,0.4)" stroke="#3498db" stroke-width="2"/>
    <text x="312" y="259" font-family="Arial" font-size="12" fill="#3498db" text-anchor="middle" font-weight="bold">S</text>

    <line x1="372" y1="198" x2="328" y2="175" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <circle cx="312" cy="167" r="20" fill="rgba(46,204,113,0.4)" stroke="#2ecc71" stroke-width="2"/>
    <text x="312" y="173" font-family="Arial" font-size="12" fill="#2ecc71" text-anchor="middle" font-weight="bold">K</text>
  </g>

  <!-- Wheat / plant left -->
  <g transform="translate(60, 50)" opacity="0.7">
    <line x1="40" y1="320" x2="40" y2="100" stroke="rgba(230,126,34,0.5)" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="34" cy="90"  rx="10" ry="20" fill="#e67e22" opacity="0.7" transform="rotate(-20 34 90)"/>
    <ellipse cx="46" cy="72"  rx="10" ry="20" fill="#e67e22" opacity="0.65" transform="rotate(20 46 72)"/>
    <ellipse cx="40" cy="55"  rx="10" ry="22" fill="#e67e22" opacity="0.8"/>
    <line x1="40" y1="160" x2="15" y2="130" stroke="rgba(230,126,34,0.4)" stroke-width="2"/>
    <line x1="40" y1="180" x2="65" y2="150" stroke="rgba(230,126,34,0.4)" stroke-width="2"/>
    <line x1="40" y1="200" x2="15" y2="175" stroke="rgba(230,126,34,0.35)" stroke-width="2"/>
  </g>

  <!-- Protein bar / product (right) -->
  <g transform="translate(580, 110)" opacity="0.85">
    <rect x="0" y="0" width="100" height="160" rx="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <rect x="5" y="5" width="90" height="50" rx="7" fill="rgba(230,126,34,0.4)"/>
    <text x="50" y="20" font-family="Arial" font-size="9" fill="white" text-anchor="middle" font-weight="bold">PLANT-BASED</text>
    <text x="50" y="35" font-family="Arial" font-size="15" fill="white" text-anchor="middle" font-weight="900">PROTEIN</text>
    <text x="50" y="48" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.8)" text-anchor="middle">ISOLATE</text>
    <rect x="5" y="60" width="90" height="4"  rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="5" y="70" width="90" height="4"  rx="2" fill="rgba(255,255,255,0.15)"/>
    <rect x="5" y="80" width="70" height="4"  rx="2" fill="rgba(255,255,255,0.15)"/>
    <rect x="5" y="98" width="90" height="20" rx="3" fill="rgba(255,255,255,0.1)"/>
    <text x="50" y="112" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="middle">Per serving: 25g protein</text>
    <rect x="10" y="130" width="80" height="22" rx="4" fill="#e67e22" opacity="0.8"/>
    <text x="50" y="145" font-family="Arial" font-size="11" fill="white" text-anchor="middle" font-weight="bold">NON-GMO ✓</text>
  </g>

  <!-- DNA helix hint (top right) -->
  <g transform="translate(680, 30)" opacity="0.4">
    <path d="M20,0 Q50,30 20,60 Q-10,90 20,120 Q50,150 20,180" fill="none" stroke="#e67e22" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M40,0 Q10,30 40,60 Q70,90 40,120 Q10,150 40,180" fill="none" stroke="#3498db" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="18"  x2="40" y2="22"  stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <line x1="20" y1="42"  x2="40" y2="42"  stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <line x1="26" y1="62"  x2="36" y2="58"  stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <line x1="20" y1="78"  x2="40" y2="78"  stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <line x1="20" y1="102" x2="40" y2="100" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <line x1="22" y1="122" x2="40" y2="118" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <line x1="26" y1="152" x2="36" y2="148" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  </g>

  <!-- Category badge -->
  <rect x="50" y="340" width="140" height="32" rx="16" fill="#9b59b6"/>
  <text x="120" y="361" font-family="'Inter',Arial,sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1">INGREDIENTS</text>

  <!-- Bottom bar -->
  <rect x="0" y="390" width="800" height="30" fill="rgba(0,0,0,0.3)"/>
  <text x="400" y="408" font-family="'Inter',Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="600">
    Food Ingredients, Additives &amp; Nutritional Science
  </text>
</svg>
