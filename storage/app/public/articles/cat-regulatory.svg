<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Background pattern dots -->
  <g fill="rgba(255,255,255,0.03)">
    <circle cx="100" cy="100" r="80"/><circle cx="700" cy="320" r="100"/>
    <circle cx="750" cy="80"  r="60"/><circle cx="50"  cy="380" r="70"/>
  </g>

  <!-- Main shield -->
  <g transform="translate(290, 30)">
    <path d="M110,0 L220,40 L220,160 Q220,240 110,290 Q0,240 0,160 L0,40 Z"
          fill="rgba(230,126,34,0.15)" stroke="#e67e22" stroke-width="3"/>
    <!-- Shield inner -->
    <path d="M110,20 L200,53 L200,162 Q200,228 110,272 Q20,228 20,162 L20,53 Z"
          fill="rgba(255,255,255,0.05)"/>
    <!-- Checkmark -->
    <polyline points="65,145 95,175 155,110" fill="none" stroke="#e67e22" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Document lines (left) -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="140" height="180" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <rect x="12" y="20" width="116" height="8"  rx="2" fill="rgba(255,255,255,0.3)"/>
    <rect x="12" y="36" width="90"  height="5"  rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="12" y="48" width="100" height="5"  rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="12" y="60" width="80"  height="5"  rx="2" fill="rgba(255,255,255,0.15)"/>
    <rect x="12" y="80" width="116" height="8"  rx="2" fill="rgba(230,126,34,0.5)"/>
    <rect x="12" y="96" width="90"  height="5"  rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="12" y="108" width="100" height="5" rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="12" y="120" width="70" height="5"  rx="2" fill="rgba(255,255,255,0.15)"/>
    <rect x="12" y="140" width="116" height="8" rx="2" fill="rgba(230,126,34,0.4)"/>
    <rect x="12" y="156" width="80" height="5"  rx="2" fill="rgba(255,255,255,0.2)"/>
    <!-- Stamp -->
    <circle cx="105" cy="148" r="22" fill="none" stroke="#e67e22" stroke-width="3" opacity="0.7"/>
    <text x="105" y="153" font-family="Arial" font-size="10" fill="#e67e22" text-anchor="middle" font-weight="bold" opacity="0.7">APPROVED</text>
  </g>

  <!-- Document (right) -->
  <g transform="translate(590, 100)">
    <rect x="0" y="0" width="130" height="170" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <rect x="10" y="18" width="110" height="7"  rx="2" fill="rgba(255,255,255,0.3)"/>
    <rect x="10" y="32" width="85"  height="4"  rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="10" y="42" width="95"  height="4"  rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="10" y="60" width="110" height="7"  rx="2" fill="rgba(230,126,34,0.5)"/>
    <rect x="10" y="74" width="85"  height="4"  rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="10" y="84" width="70"  height="4"  rx="2" fill="rgba(255,255,255,0.15)"/>
    <rect x="10" y="100" width="110" height="7" rx="2" fill="rgba(255,255,255,0.25)"/>
    <rect x="10" y="114" width="90"  height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="10" y="142" width="50"  height="14" rx="3" fill="#e67e22" opacity="0.8"/>
  </g>

  <!-- EU stars circle -->
  <g transform="translate(690, 30)">
    <circle cx="40" cy="40" r="38" fill="rgba(0,82,156,0.5)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <g fill="#FFD700" font-size="10">
      <text x="38" y="12"  text-anchor="middle">★</text>
      <text x="58" y="20"  text-anchor="middle">★</text>
      <text x="66" y="42"  text-anchor="middle">★</text>
      <text x="58" y="64"  text-anchor="middle">★</text>
      <text x="38" y="72"  text-anchor="middle">★</text>
      <text x="18" y="64"  text-anchor="middle">★</text>
      <text x="10" y="42"  text-anchor="middle">★</text>
      <text x="18" y="20"  text-anchor="middle">★</text>
    </g>
  </g>

  <!-- Category badge -->
  <rect x="50" y="330" width="200" height="32" rx="16" fill="#e67e22"/>
  <text x="150" y="351" font-family="'Inter',Arial,sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1">REGULATORY &amp; SAFETY</text>

  <!-- Bottom bar -->
  <rect x="0" y="390" width="800" height="30" fill="rgba(0,0,0,0.3)"/>
  <text x="400" y="408" font-family="'Inter',Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="600">
    Food Industry Compliance, Safety Standards &amp; Regulations
  </text>
</svg>
