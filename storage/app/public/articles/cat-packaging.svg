<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a2a"/>
      <stop offset="100%" style="stop-color:#2d4a1e"/>
    </linearGradient>
    <linearGradient id="box1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(230,126,34,0.6)"/>
      <stop offset="100%" style="stop-color:rgba(230,126,34,0.35)"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Background pattern -->
  <g opacity="0.04" fill="white">
    <rect x="0"   y="0"   width="100" height="100"/><rect x="100" y="100" width="100" height="100"/>
    <rect x="200" y="0"   width="100" height="100"/><rect x="300" y="100" width="100" height="100"/>
    <rect x="400" y="0"   width="100" height="100"/><rect x="500" y="100" width="100" height="100"/>
    <rect x="600" y="0"   width="100" height="100"/><rect x="700" y="100" width="100" height="100"/>
    <rect x="0"   y="200" width="100" height="100"/><rect x="100" y="300" width="100" height="100"/>
    <rect x="200" y="200" width="100" height="100"/><rect x="300" y="300" width="100" height="100"/>
  </g>

  <!-- Big box (center, isometric-style) -->
  <g transform="translate(250, 80)">
    <!-- Box top face -->
    <polygon points="140,0 280,50 140,100 0,50" fill="rgba(230,126,34,0.6)"/>
    <!-- Box right face -->
    <polygon points="280,50 280,200 140,250 140,100" fill="rgba(230,126,34,0.35)"/>
    <!-- Box left face -->
    <polygon points="0,50 0,200 140,250 140,100" fill="rgba(230,126,34,0.45)"/>
    <!-- Box lines (top) -->
    <line x1="140" y1="0" x2="140" y2="100" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <!-- Label on left face -->
    <polygon points="20,120 20,190 130,230 130,160" fill="rgba(255,255,255,0.15)"/>
    <line x1="30" y1="140" x2="125" y2="174" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <line x1="30" y1="152" x2="115" y2="184" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <line x1="30" y1="164" x2="100" y2="193" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <!-- Recycle symbol on right face -->
    <text x="210" y="165" font-family="Arial" font-size="40" fill="rgba(255,255,255,0.2)" text-anchor="middle">♻</text>
    <!-- Tape on top -->
    <polygon points="110,50 170,50 175,55 105,55" fill="rgba(255,255,255,0.35)"/>
  </g>

  <!-- Small box (left) -->
  <g transform="translate(70, 200)">
    <polygon points="65,0 130,24 65,48 0,24" fill="rgba(255,255,255,0.2)"/>
    <polygon points="130,24 130,110 65,134 65,48" fill="rgba(255,255,255,0.12)"/>
    <polygon points="0,24 0,110 65,134 65,48" fill="rgba(255,255,255,0.16)"/>
  </g>

  <!-- Small box (right) -->
  <g transform="translate(620, 190)">
    <polygon points="65,0 130,24 65,48 0,24" fill="rgba(255,255,255,0.18)"/>
    <polygon points="130,24 130,110 65,134 65,48" fill="rgba(255,255,255,0.1)"/>
    <polygon points="0,24 0,110 65,134 65,48" fill="rgba(255,255,255,0.14)"/>
  </g>

  <!-- Leaf/biodegradable badge -->
  <g transform="translate(60, 50)">
    <circle cx="55" cy="55" r="52" fill="rgba(39,174,96,0.2)" stroke="#27ae60" stroke-width="2"/>
    <path d="M55,20 Q85,30 85,55 Q85,80 55,90 Q55,90 55,55 Z" fill="#27ae60" opacity="0.6"/>
    <path d="M55,20 Q25,30 25,55 Q25,80 55,90 Q55,90 55,55 Z" fill="#27ae60" opacity="0.4"/>
    <line x1="55" y1="55" x2="55" y2="88" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <text x="55" y="108" font-family="Arial" font-size="9" fill="#2ecc71" text-anchor="middle" font-weight="bold">BIO</text>
  </g>

  <!-- Stats (top right) -->
  <g transform="translate(600, 50)">
    <rect x="0" y="0" width="170" height="80" rx="10" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="15" y="28" font-family="'Inter',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">BRANDS ADOPTING</text>
    <text x="15" y="55" font-family="'Inter',Arial,sans-serif" font-size="32" fill="#e67e22" font-weight="900">68%</text>
    <text x="15" y="70" font-family="'Inter',Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">biodegradable solutions</text>
  </g>

  <!-- Category badge -->
  <rect x="50" y="340" width="130" height="32" rx="16" fill="#27ae60"/>
  <text x="115" y="361" font-family="'Inter',Arial,sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1">PACKAGING</text>

  <!-- Bottom bar -->
  <rect x="0" y="390" width="800" height="30" fill="rgba(0,0,0,0.3)"/>
  <text x="400" y="408" font-family="'Inter',Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="600">
    Sustainable &amp; Innovative Food Packaging Solutions
  </text>
</svg>
