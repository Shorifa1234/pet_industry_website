<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 64" width="260" height="64">
  <!-- Transparent background version for dark headers -->

  <!-- Icon: white factory outline -->
  <!-- Factory building body -->
  <rect x="2" y="36" width="44" height="20" rx="3" fill="white"/>

  <!-- Left chimney -->
  <rect x="5"  y="18" width="10" height="20" rx="2" fill="white"/>
  <!-- Right chimney -->
  <rect x="22" y="23" width="10" height="15" rx="2" fill="white"/>

  <!-- Chimney caps -->
  <rect x="3"  y="16" width="14" height="4" rx="2" fill="#e67e22"/>
  <rect x="20" y="21" width="14" height="4" rx="2" fill="#e67e22"/>

  <!-- Smoke dots -->
  <circle cx="10" cy="10" r="3.5" fill="#e67e22" opacity="0.9"/>
  <circle cx="16" cy="6"  r="2.5" fill="#e67e22" opacity="0.7"/>
  <circle cx="27" cy="13" r="3"   fill="#e67e22" opacity="0.8"/>

  <!-- Door -->
  <rect x="16" y="44" width="16" height="12" rx="2" fill="#1a5276"/>

  <!-- Windows -->
  <rect x="5"  y="40" width="8" height="6" rx="1" fill="#1a5276"/>
  <rect x="35" y="40" width="8" height="6" rx="1" fill="#1a5276"/>

  <!-- Wheat stalk -->
  <line x1="52" y1="35" x2="52" y2="55" stroke="#e67e22" stroke-width="1.5" stroke-linecap="round"/>
  <ellipse cx="50" cy="32" rx="2" ry="3.5" fill="#e67e22" transform="rotate(-20 50 32)"/>
  <ellipse cx="54" cy="30" rx="2" ry="3.5" fill="#e67e22" transform="rotate(20 54 30)"/>
  <ellipse cx="52" cy="27" rx="2" ry="3.5" fill="#e67e22"/>

  <!-- Divider -->
  <line x1="68" y1="8" x2="68" y2="56" stroke="rgba(255,255,255,0.25)" stroke-width="1.2"/>

  <!-- "Food" text -->
  <text x="80" y="34"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="28"
        font-weight="800"
        fill="white"
        letter-spacing="-0.8">Food</text>

  <!-- "&Industry" -->
  <text x="80" y="54"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="15"
        font-weight="600"
        letter-spacing="0.3">
    <tspan fill="#e67e22">&amp;</tspan><tspan fill="rgba(255,255,255,0.85)">Industry Portal</tspan>
  </text>
</svg>
